<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil Saya</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1e3c72);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            color: white;
            text-align: center;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            padding: 40px 20px;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
        }

        h1 {
            margin: 15px 0 5px;
        }

        p {
            opacity: 0.9;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin: 20px auto;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 15px;
            background: #1e3c72;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2c5364;
        }

        footer {
            margin-top: 30px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="https://via.placeholder.com/150" class="profile-img" alt="Foto Profil">
        <h1>Fairuz Imanulhaq</h1>
        <p>Pelajar | Tech Enthusiast | Future Developer</p>

        <div class="card">
            <h2>Tentang Saya</h2>
            <p>
                Saya tertarik pada teknologi, pengembangan web, dan dunia digital.
                Saat ini saya sedang belajar membangun website dan project online.
            </p>
            <a href="#" class="btn">Hubungi Saya</a>
        </div>

        <div class="card">
            <h2>Skill</h2>
            <p>HTML • CSS • GitHub • Dasar Programming</p>
        </div>

        <footer>
            © 2026 Nama Kamu
        </footer>
    </div>

</body>
</html>
